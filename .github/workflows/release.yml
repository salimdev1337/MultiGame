name: Release - Create GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on tags like v1.0.0, v2.1.3, etc.

permissions:
  contents: write

jobs:
  # Job 1: Create the release
  create-release:
    name:  Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get all history for changelog
          
      # Extract version from tag (v1.0.0 -> 1.0.0) and build number from
      # total commit count — monotonically increasing, no manual edits needed.
      - name:  Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION  Build: $BUILD_NUMBER"
          
      # Generate changelog from commits
      - name:  Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      # Create GitHub Release
      - name:  Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Puzzle Game v${{ steps.version.outputs.version }}
          body: |
            ##  Puzzle Game v${{ steps.version.outputs.version }}
            
            ###  Downloads
            - **Android**: Download `puzzle-android.apk` below
            - **Windows**: Download `puzzle-windows.zip` below
            - **Web**: Play online at [GitHub Pages](https://salimdev1337.github.io/puzzle)
            
            ###  What's Changed
            ${{ steps.changelog.outputs.changelog }}
            
            ###  Installation
            
            **Android:**
            1. Download `puzzle-android.apk`
            2. Install on your device
            3. Enjoy!
            
            **Windows:**
            1. Download `puzzle-windows.zip`
            2. Extract the ZIP file
            3. Run `puzzle.exe`
            
            ---
            Built with using Flutter
          draft: false
          prerelease: false

  # Job 2: Build and upload Android
  build-android:
    name: Build & Upload Android
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name:  Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name:  Setup Firebase config
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > android/app/google-services.json
          echo "$FIREBASE_OPTIONS_DART_B64" | base64 --decode > lib/config/firebase_options.dart

      - name:  Get dependencies
        run: flutter pub get

      - name: Restore release keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail

          # Decode keystore — strip any whitespace/newlines that break base64
          echo "$KEYSTORE_B64" | tr -d '\n\r ' | base64 --decode > /tmp/multigame-release-key.jks

          # 1) Validate store password (catches corrupt file or wrong store password)
          keytool -list \
            -keystore /tmp/multigame-release-key.jks \
            -storepass "$KEY_STORE_PASSWORD" \
            >/dev/null \
            || { echo "ERROR: store password is incorrect or keystore file is corrupt"; exit 1; }

          # 2) Validate alias exists inside the keystore
          keytool -list \
            -keystore /tmp/multigame-release-key.jks \
            -storepass "$KEY_STORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            >/dev/null \
            || { echo "ERROR: alias '$KEY_ALIAS' not found in keystore"; exit 1; }

          # 3) Validate key password by generating a throw-away CSR
          keytool -certreq \
            -keystore /tmp/multigame-release-key.jks \
            -storepass "$KEY_STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -file /tmp/test.csr \
            >/dev/null 2>&1 \
            || { echo "ERROR: key password for alias '$KEY_ALIAS' is incorrect"; exit 1; }

          rm -f /tmp/test.csr

          cat > android/key.properties <<EOF
          storePassword=$KEY_STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=/tmp/multigame-release-key.jks
          EOF

      - name: Build APK
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ANDROID: ${{ secrets.ADMOB_BANNER_ANDROID }}
          ADMOB_INTERSTITIAL_ANDROID: ${{ secrets.ADMOB_INTERSTITIAL_ANDROID }}
        run: |
          EXTRA_DEFINES=""
          if [ -n "$UNSPLASH_ACCESS_KEY" ]; then
            EXTRA_DEFINES="$EXTRA_DEFINES --dart-define=UNSPLASH_ACCESS_KEY=$UNSPLASH_ACCESS_KEY"
          fi
          if [ -n "$ADMOB_BANNER_ANDROID" ]; then
            EXTRA_DEFINES="$EXTRA_DEFINES --dart-define=ADMOB_BANNER_ANDROID=$ADMOB_BANNER_ANDROID"
          fi
          if [ -n "$ADMOB_INTERSTITIAL_ANDROID" ]; then
            EXTRA_DEFINES="$EXTRA_DEFINES --dart-define=ADMOB_INTERSTITIAL_ANDROID=$ADMOB_INTERSTITIAL_ANDROID"
          fi
          flutter build apk --release \
            $EXTRA_DEFINES \
            --build-name=${{ needs.create-release.outputs.version }} \
            --build-number=${{ needs.create-release.outputs.build_number }}

      # Rename APK for release
      - name:  Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk multigame-android.apk
          
      - name:  Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./multigame-android.apk
          asset_name: multigame-android.apk
          asset_content_type: application/vnd.android.package-archive

  # Job 3: Build and upload Windows
  build-windows:
    name:  Build & Upload Windows
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name:  Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name:  Setup Firebase config
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: echo "$FIREBASE_OPTIONS_DART_B64" | base64 --decode > lib/config/firebase_options.dart
        shell: bash

      - name:  Get dependencies
        run: flutter pub get
        
      - name:  Build Windows
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          flutter build windows --release `
            --dart-define=UNSPLASH_ACCESS_KEY=$env:UNSPLASH_ACCESS_KEY `
            --build-name=${{ needs.create-release.outputs.version }} `
            --build-number=${{ needs.create-release.outputs.build_number }}
        
      - name:  Package Windows
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath puzzle-windows.zip
          
      - name:  Upload Windows ZIP to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./puzzle-windows.zip
          asset_name: puzzle-windows.zip
          asset_content_type: application/zip

  # Job 4: Release summary
  release-summary:
    name:  Release Summary
    needs: [create-release, build-android, build-windows]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name:  Success message
        run: |
          echo "##  Release v${{ needs.create-release.outputs.version }} Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "###  Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- Android: ${{ needs.build-android.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Windows: ${{ needs.build-windows.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "###  Downloads available at:" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
